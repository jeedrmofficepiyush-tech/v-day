<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body{
text-align:center;
font-family:Arial;
background:#ffe6f0;
}

h1{
margin-top:100px;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
cursor:pointer;
}

#no{
position:absolute;
}
</style>
</head>

<body>

<h1>Will you be my Valentine? ❤️</h1>

<button onclick="yes()">Yes</button>
<button id="no" onmouseover="move()">No</button>

<script>

function yes(){
document.body.innerHTML="<h1>Yayyyy ❤️ I knew it!</h1>";
}

function move(){
let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

document.getElementById("no").style.left=x+"px";
document.getElementById("no").style.top=y+"px";
}

</script>

</body>
</html>
