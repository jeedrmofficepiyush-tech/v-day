<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#ffe6f0;
margin-top:120px;
}

button{
padding:12px 25px;
font-size:20px;
margin:10px;
cursor:pointer;
}

#no{
position:relative;
}

</style>

</head>

<body>

<h1 id="question">Will you please give me your WhatsApp number? ❤️</h1>

<button id="yes" onclick="yes()">Yes</button>
<button id="no" onclick="no()">No</button>

<script>

let step = 1;
let yesSize = 20;

function no(){

step++;

if(step==2){
document.getElementById("question").innerHTML =
"Are you sure? Maybe just send Hi on WhatsApp 9106031895 🙂";

yesSize += 10;
document.getElementById("yes").style.fontSize = yesSize+"px";
}

else if(step==3){
document.getElementById("question").innerHTML =
"Come on... it will make my day 😅";

yesSize += 15;
document.getElementById("yes").style.fontSize = yesSize+"px";
}

else if(step==4){
document.getElementById("question").innerHTML =
"Last chance 😄";

yesSize += 20;
document.getElementById("yes").style.fontSize = yesSize+"px";

document.getElementById("no").onmouseover = move;
}

}

function move(){
let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

let noBtn=document.getElementById("no");
noBtn.style.position="absolute";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
}

function yes(){
document.body.innerHTML =
"<h1>Yeeee ❤️ I knew it.. you are such a gentle person...<br><br>Chalo abhi karo message please on WhatsApp: 9106031895</h1>";
}

</script>

</body>
</html>
